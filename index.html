<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MAYORISTA V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <i class="fas fa-mobile-alt text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold mb-6">Acceso al Sistema</h1>
            <button onclick="entrarComo('vendedor')" class="w-full bg-green-600 p-3 rounded-lg mb-3 hover:bg-green-700 font-bold transition">
                <i class="fas fa-user-tag mr-2"></i> SOY VENDEDOR
            </button>
            <button onclick="entrarComo('jefe')" class="w-full bg-blue-600 p-3 rounded-lg hover:bg-blue-700 font-bold transition">
                <i class="fas fa-user-tie mr-2"></i> SOY JEFE
            </button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-green-400">Nueva Venta</h2>
            <button onclick="location.reload()" class="bg-slate-700 px-3 py-1 rounded text-sm">Cerrar</button>
        </div>
        <div class="bg-white text-slate-900 p-6 rounded-xl shadow-lg">
            <div class="space-y-4">
                <div>
                    <label class="block font-bold mb-1">Modelo</label>
                    <input type="text" id="modelo" class="w-full border p-2 rounded shadow-sm" placeholder="Ej: iPhone 13">
                </div>
                <div>
                    <label class="block font-bold mb-1">IMEI / Serie</label>
                    <input type="text" id="imei" class="w-full border p-2 rounded shadow-sm" placeholder="15 dígitos">
                </div>
                <div>
                    <label class="block font-bold mb-1">Precio de Venta ($)</label>
                    <input type="number" id="precio" class="w-full border p-2 rounded shadow-sm" placeholder="0.00">
                </div>
                <button onclick="registrarVenta()" id="btnRegistrar" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg hover:bg-green-700">
                    REGISTRAR VENTA
                </button>
            </div>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-400">Panel de Control</h2>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-sm font-bold">Cerrar Sesión</button>
        </div>
        <div class="bg-slate-800 p-6 rounded-xl border border-blue-500 text-center">
            <p>Bienvenido, Jefe. Aquí verás tus reportes pronto.</p>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const urlScript = "https://script.google.com/macros/s/AKfycby0b7Nii52CzKkrO5C-waVIYdchxF9OmETbGC76Vrn_hU9m_AwELac_hrpg7Magk9ir/exec";

        function entrarComo(rol) {
            document.getElementById('loginScreen').classList.add('hidden');
            if(rol === 'vendedor') {
                document.getElementById('vendedorView').classList.remove('hidden');
            } else {
                let clave = prompt("Ingrese clave de Jefe:");
                if(clave === "1234") {
                    document.getElementById('jefeView').classList.remove('hidden');
                } else {
                    alert("Clave incorrecta");
                    location.reload();
                }
            }
        }

        async function registrarVenta() {
            const modelo = document.getElementById('modelo').value;
            const imei = document.getElementById('imei').value;
            const precio = document.getElementById('precio').value;

            if(!modelo || !imei || !precio) {
                alert("Por favor rellena todos los campos");
                return;
            }

            const btn = document.getElementById('btnRegistrar');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            const datos = {
                modelo: modelo,
                imei: imei,
                precio: precio,
                costo: 0,
                vendedor: "Vendedor Web"
            };

            try {
                await fetch(urlScript, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(datos)
                });
                alert("✅ Venta registrada en Google Sheets");
                document.getElementById('modelo').value = "";
                document.getElementById('imei').value = "";
                document.getElementById('precio').value = "";
            } catch (e) {
                alert("Error: " + e);
            } finally {
                btn.disabled = false;
                btn.innerText = "REGISTRAR VENTA";
            }
        }
    </script>
</body>
</html>
