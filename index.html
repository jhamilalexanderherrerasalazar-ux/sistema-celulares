<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS MOONSTORESA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            #areaImpresion, #areaImpresion * { visibility: visible; }
            #areaImpresion { 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%; 
                display: block !important;
                color: black !important;
            }
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="areaImpresion" class="hidden text-black p-6 font-mono">
        <div style="text-align: center; border-bottom: 2px dashed black; padding-bottom: 10px; margin-bottom: 10px;">
            <h1 style="font-size: 20px; font-weight: bold;">MOONSTORESA</h1>
            <p style="font-size: 12px;">CELULAR: +591 60126617</p>
        </div>
        <div style="font-size: 14px; line-height: 1.5;">
            <p><b>FECHA:</b> <span id="printFecha"></span></p>
            <p><b>MODELO:</b> <span id="printModelo"></span></p>
            <p><b>IMEI:</b> <span id="printImei"></span></p>
            <div style="border-top: 2px dashed black; margin-top: 10px; padding-top: 10px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between;">
                <span>TOTAL:</span>
                <span id="printMonto"></span>
            </div>
        </div>
        <p style="text-align: center; margin-top: 20px; font-style: italic;">¡Gracias por su compra!</p>
    </div>

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h1 class="text-2xl font-bold mb-6 text-blue-400 italic italic">MOONSTORESA</h1>
            <div id="tasaDia" class="text-yellow-400 mb-4 font-mono text-sm font-bold">Cargando Sistema...</div>
            <button onclick="abrirVendedor()" class="w-full bg-green-600 p-4 rounded-xl mb-3 font-bold hover:bg-green-700 transition">VENDEDOR</button>
            <button onclick="abrirJefe()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-700 transition">JEFE / DUEÑO</button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-md mx-auto">
        <div class="bg-white text-slate-900 p-5 rounded-2xl shadow-2xl space-y-4">
            <h2 class="text-xl font-black text-green-600 text-center uppercase">Nueva Venta</h2>
            <input type="text" id="busqueda" onkeyup="buscarStock()" class="w-full border-2 p-3 rounded-xl outline-none focus:border-green-500" placeholder="🔍 Buscar equipo...">
            <div id="listaSugerencias" class="bg-slate-50 max-h-48 overflow-y-auto rounded-lg border"></div>
            <div id="detallesEquipo" class="p-3 bg-blue-50 text-blue-800 rounded-xl text-center text-sm font-bold border-2 border-blue-100">Seleccione un equipo</div>
            <div class="flex gap-2">
                <button onclick="setMoneda('USD')" id="btnUSD" class="flex-1 p-2 rounded-xl font-bold bg-green-600 text-white shadow-md">USD $</button>
                <button onclick="setMoneda('BS')" id="btnBS" class="flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600">Bs.</button>
            </div>
            <input type="number" id="precioVenta" oninput="calcularTotal()" class="w-full border-2 p-4 rounded-2xl text-2xl font-black text-center text-blue-600" placeholder="0.00">
            <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Equivalente:</span>
                <span id="labelEquivalente" class="text-yellow-400 font-bold">0.00</span>
            </div>
            <button onclick="confirmarVenta()" id="btnVenta" class="w-full bg-green-600 text-white p-4 rounded-2xl font-black shadow-lg uppercase hover:bg-green-700">Finalizar Venta</button>
            <button onclick="location.reload()" class="w-full text-slate-400 text-xs font-bold py-2 text-center underline">VOLVER</button>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-400 uppercase">Panel Jefe</h2>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-xs font-bold text-white uppercase shadow-lg">Salir</button>
        </div>
        <div class="bg-gradient-to-br from-red-600 to-red-900 p-5 rounded-2xl shadow-xl mb-6 text-center text-white">
            <h3 class="text-xs font-bold mb-4 uppercase tracking-widest">Cierre de Caja Diario</h3>
            <button onclick="ejecutarCierre()" id="btnCierre" class="w-full bg-white text-red-600 p-4 rounded-xl font-black shadow-lg hover:bg-slate-100">
                <i class="fas fa-cloud-upload-alt mr-2"></i> CERRAR Y SUBIR A DRIVE
            </button>
        </div>
        <div class="bg-slate-800 p-4 rounded-2xl border border-yellow-600/30 mb-6 shadow-xl">
            <h3 class="text-yellow-500 text-[10px] font-bold mb-2 uppercase">Configurar Tasa</h3>
            <div class="flex gap-2">
                <input type="number" id="nuevaTasa" class="bg-white p-3 rounded-xl w-full text-slate-900 font-bold outline-none" placeholder="Ej: 12.80">
                <button onclick="guardarTasa()" class="bg-yellow-600 px-6 rounded-xl font-bold text-white uppercase">OK</button>
            </div>
        </div>
        <div class="bg-slate-800 p-5 rounded-2xl border border-blue-500/30 shadow-2xl space-y-4">
            <h3 class="text-blue-400 text-xs font-bold mb-2 uppercase text-center tracking-widest">Carga de Mercadería</h3>
            <div class="grid grid-cols-2 gap-3 text-slate-900">
                <input type="text" id="invMarca" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Marca">
                <input type="text" id="invModelo" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Modelo">
                <input type="text" id="invImei" class="p-3 rounded-xl bg-white text-sm font-semibold col-span-2" placeholder="IMEI">
                <input type="number" id="invCosto" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Costo Unit $">
                <input type="number" id="invCantidad" class="p-3 rounded-xl bg-slate-200 font-bold text-center" value="1">
            </div>
            <button onclick="cargarInventario()" id="btnCargar" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg uppercase">Cargar al Stock</button>
        </div>
    </div>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbwz5JH1R7VpcFbtkrAQSq8p-znnGt6zjrQpSB65Pl7cPFJ1w042KCUT2ur0LnHNsIjA/exec";
        let stockReal = [];
        let monedaActual = 'USD';
        window.tasaGlobal = 12.50;

        window.onload = async () => {
            try {
                const resTasa = await fetch(urlScript + "?action=getTasa");
                const tasaVal = await resTasa.text();
                window.tasaGlobal = parseFloat(tasaVal) || 12.50;
                document.getElementById('tasaDia').innerText = "Tasa Actual: " + window.tasaGlobal + " Bs";
                const resInv = await fetch(urlScript + "?action=getInventario");
                stockReal = await resInv.json();
            } catch (e) {
                document.getElementById('tasaDia').innerText = "Error de Conexión";
            }
        };

        function setMoneda(m) {
            monedaActual = m;
            document.getElementById('btnUSD').className = m === 'USD' ? 'flex-1 p-2 rounded-xl font-bold bg-green-600 text-white' : 'flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600';
            document.getElementById('btnBS').className = m === 'BS' ? 'flex-1 p-2 rounded-xl font-bold bg-blue-600 text-white' : 'flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600';
            calcularTotal();
        }

        function calcularTotal() {
            const monto = document.getElementById('precioVenta').value;
            const label = document.getElementById('labelEquivalente');
            if(!monto) { label.innerText = "0.00"; return; }
            label.innerText = monedaActual === 'USD' ? (monto * window.tasaGlobal).toFixed(2) + " Bs" : (monto / window.tasaGlobal).toFixed(2) + " $ USD";
        }

        function buscarStock() {
            const busq = document.getElementById('busqueda').value.toLowerCase();
            const sug = document.getElementById('listaSugerencias');
            sug.innerHTML = "";
            if (busq.length < 1) return;
            const filtrados = stockReal.filter(i => i.modelo.toLowerCase().includes(busq) || i.imei.toString().includes(busq));
            filtrados.forEach(i => {
                const d = document.createElement('div');
                d.className = "p-3 border-b text-slate-800 text-sm cursor-pointer hover:bg-blue-50 text-left";
                d.innerHTML = `<b>${i.marca} ${i.modelo}</b><br><span class="text-xs text-gray-400">IMEI: ${i.imei}</span>`;
                d.onclick = () => {
                    window.equipoVenta = i;
                    document.getElementById('detallesEquipo').innerHTML = `📦 <b>${i.marca} ${i.modelo}</b><br><span class='text-xs'>IMEI: ${i.imei}</span>`;
                    document.getElementById('busqueda').value = i.modelo;
                    sug.innerHTML = "";
                };
                sug.appendChild(d);
            });
        }

        async function confirmarVenta() {
            const monto = document.getElementById('precioVenta').value;
            if(!window.equipoVenta || !monto) return alert("Seleccione equipo y precio");
            const btn = document.getElementById('btnVenta');
            btn.disabled = true; btn.innerText = "GUARDANDO...";

            const datos = {
                accion: "registrarVenta",
                modelo: window.equipoVenta.modelo,
                imei: window.equipoVenta.imei,
                costo: window.equipoVenta.costo,
                precioUsd: monedaActual === 'USD' ? monto : (monto / window.tasaGlobal).toFixed(2),
                precioBs: monedaActual === 'BS' ? monto : (monto * window.tasaGlobal).toFixed(2),
                tasaUsada: window.tasaGlobal,
                vendedor: "Web"
            };

            try {
                // Escribir datos en el ticket antes de imprimir
                document.getElementById('printFecha').innerText = new Date().toLocaleString();
                document.getElementById('printModelo').innerText = datos.modelo;
                document.getElementById('printImei').innerText = datos.imei;
                document.getElementById('printMonto').innerText = monto + " " + monedaActual;

                await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
                
                alert("✅ VENTA REGISTRADA. Preparando Ticket...");
                
                // Pequeña pausa para asegurar que el HTML se actualice
                setTimeout(() => {
                    window.print();
                    location.reload();
                }, 1000);

            } catch (e) { alert("Error de conexión"); btn.disabled = false; }
        }

        async function ejecutarCierre() {
            if(!confirm("¿Cerrar Caja y subir a Drive?")) return;
            const btn = document.getElementById('btnCierre');
            btn.disabled = true; btn.innerText = "PROCESANDO...";
            try {
                await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: "cierreCaja" }) });
                alert("✅ CIERRE GUARDADO EN DRIVE");
                location.reload();
            } catch (e) { alert("Error"); btn.disabled = false; }
        }

        function abrirVendedor() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('vendedorView').classList.remove('hidden'); }
        function abrirJefe() { if(prompt("Clave:") === "1234") { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('jefeView').classList.remove('hidden'); } }
        async function guardarTasa() {
            const t = document.getElementById('nuevaTasa').value;
            if(!t) return;
            await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: "actualizarTasa", tasa: t }) });
            alert("✅ Tasa Actualizada");
            location.reload();
        }
        async function cargarInventario() {
            const btn = document.getElementById('btnCargar');
            btn.disabled = true; btn.innerText = "CARGANDO...";
            const d = {
                accion: "cargarStock",
                marca: document.getElementById('invMarca').value,
                modelo: document.getElementById('invModelo').value,
                imei: document.getElementById('invImei').value || "LOTE",
                costo: document.getElementById('invCosto').value,
                cantidad: document.getElementById('invCantidad').value
            };
            await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            alert("✅ Stock Registrado");
            location.reload();
        }
    </script>
</body>
</html>
