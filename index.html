<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Celulares Bolivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h1 class="text-2xl font-bold mb-6 text-white">SISTEMA POS</h1>
            <div id="tasaDia" class="text-yellow-400 mb-4 font-mono text-sm font-bold">Cargando tasa...</div>
            <button onclick="abrirVendedor()" class="w-full bg-green-600 p-3 rounded-lg mb-3 font-bold hover:bg-green-700 transition">VENDEDOR</button>
            <button onclick="abrirJefe()" class="w-full bg-blue-600 p-3 rounded-lg font-bold hover:bg-blue-700 transition">JEFE / DUEÑO</button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4 text-green-400">Registrar Venta</h2>
        <div class="bg-white text-slate-900 p-4 rounded-xl space-y-4 shadow-2xl">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase text-left">Buscar Equipo en Stock</label>
                <input type="text" id="busqueda" onkeyup="buscarStock()" class="w-full border-2 border-gray-200 p-2 rounded-lg focus:border-green-500 outline-none" placeholder="Escribe marca o modelo...">
                <div id="listaSugerencias" class="bg-gray-100 mt-1 max-h-60 overflow-y-auto rounded shadow-inner"></div>
            </div>
            <div class="p-3 bg-blue-50 rounded-lg border border-blue-200">
                <p id="detallesEquipo" class="text-sm italic text-gray-600 text-center">Selecciona un equipo de la lista...</p>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase text-left">Precio Venta ($)</label>
                <input type="number" id="precioVenta" class="w-full border-2 border-gray-200 p-2 rounded-lg focus:border-green-500 outline-none" placeholder="Ej: 850">
            </div>
            <div id="calcBs" class="text-right text-sm font-bold text-blue-700 bg-blue-50 p-2 rounded">Total en Bs: 0.00</div>
            <button onclick="confirmarVenta()" id="btnVenta" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold shadow-lg hover:bg-green-700">VENDER AHORA</button>
            <button onclick="location.reload()" class="w-full text-gray-400 text-xs mt-2 uppercase font-bold tracking-widest text-center">← Volver</button>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4 max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-400">Panel de Control</h2>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-xs font-bold uppercase">Salir</button>
        </div>
        
        <div class="bg-slate-800 p-4 rounded-xl border border-yellow-600/50 mb-6 shadow-lg text-left">
            <h3 class="text-yellow-500 font-bold mb-3 underline uppercase text-xs">Tipo de Cambio (Bolivia)</h3>
            <div class="flex gap-2">
                <input type="number" id="nuevaTasa" class="bg-slate-700 p-2 rounded-lg w-full text-white outline-none border border-slate-600" placeholder="Ej: 12.80">
                <button onclick="guardarTasa()" class="bg-yellow-600 px-6 rounded-lg font-bold hover:bg-yellow-700 transition">ACTUALIZAR</button>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-blue-500/50 shadow-lg text-left">
            <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs">Ingresar Nueva Mercadería</h3>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="invMarca" class="p-2 rounded-lg bg-slate-700 border border-slate-600 text-white" placeholder="Marca (Samsung)">
                <input type="text" id="invModelo" class="p-2 rounded-lg bg-slate-700 border border-slate-600 text-white" placeholder="Modelo (S24)">
                <input type="text" id="invImei" class="p-2 rounded-lg bg-slate-700 border border-slate-600 text-white" placeholder="IMEI">
                <input type="number" id="invCosto" class="p-2 rounded-lg bg-slate-700 border border-slate-6
