<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MAYORISTA V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <i class="fas fa-mobile-alt text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold mb-6">Acceso al Sistema</h1>
            <button onclick="showRole('vendedor')" class="w-full bg-green-600 p-3 rounded-lg mb-3 hover:bg-green-700 font-bold">
                <i class="fas fa-user-tag mr-2"></i> SOY VENDEDOR
            </button>
            <button onclick="showRole('jefe')" class="w-full bg-blue-600 p-3 rounded-lg hover:bg-blue-700 font-bold">
                <i class="fas fa-user-tie mr-2"></i> SOY JEFE
            </button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-lg mx-auto">
        <nav class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-green-400">Panel Vendedor</h2>
            <button onclick="location.reload()" class="text-sm bg-slate-700 px-3 py-1 rounded">Salir</button>
        </nav>
        <div class="bg-white text-slate-900 p-6 rounded-xl shadow-lg">
            <form id="formVenta" class="space-y-4">
                <label class="block font-bold">Modelo del Equipo</label>
                <input type="text" id="modelo" class="w-full border p-2 rounded" placeholder="Ej: iPhone 13 128GB">
                
                <label class="block font-bold">IMEI / Serie</label>
                <input type="text" id="imei" class="w-full border p-2 rounded" placeholder="Número único">
                
                <label class="block font-bold">Precio de Venta ($)</label>
                <input type="number" id="precio" class="w-full border p-2 rounded" placeholder="0.00">
                
                <button type="button" onclick="registrarVenta()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold text-lg">
                    CONFIRMAR VENTA
                </button>
            </form>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4">
        <nav class="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl">
            <h2 class="text-xl font-bold text-blue-400"><i class="fas fa-chart-line mr-2"></i>Dashboard Gerencial</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-lg font-bold">Cerrar Sesión</button>
        </nav>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-blue-900/50 p-6 rounded-xl border border-blue-500">
                <p class="text-blue-300 text-sm">Ventas del Mes</p>
                <h3 class="text-3xl font-bold">$12,450</h3>
            </div>
            <div class="bg-green-900/50 p-6 rounded-xl border border-green-500">
                <p class="text-green-300 text-sm">Ganancia Neta</p>
                <h3 class="text-3xl font-bold">$3,120</h3>
            </div>
            <div class="bg-purple-900/50 p-6 rounded-xl border border-purple-500">
                <p class="text-purple-300 text-sm">Equipos Vendidos</p>
                <h3 class="text-3xl font-bold">42</h3>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl overflow-x-auto">
            <h3 class="font-bold mb-4">Últimos Movimientos</h3>
            <table class="w-full text-left">
                <thead class="text-slate-400 text-sm border-b border-slate-700">
                    <tr>
                        <th class="pb-2">Fecha</th>
                        <th class="pb-2">Equipo</th>
                        <th class="pb-2">Vendedor</th>
                        <th class="pb-2">Venta</th>
                        <th class="pb-2 text-green-400">Ganancia</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-slate-700/50">
                        <td class="py-3">27/04</td>
                        <td>S23 Ultra</td>
                        <td>Juan Pérez</td>
                        <td>$950</td>
                        <td class="text-green-400">+$120</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function showRole(role) {
            document.getElementById('loginScreen').classList.add('hidden');
            if(role === 'vendedor') {
                document.getElementById('vendedorView').classList.remove('hidden');
            } else {
                let pass = prompt("Introduce la clave de Jefe:");
                if(pass === "1234") { // Clave temporal
                    document.getElementById('jefeView').classList.remove('hidden');
                } else {
                    alert("Clave incorrecta");
                    location.reload();
                }
            }
        }

        function registrarVenta() {
            alert("Conectando con Google Sheets... (Venta Registrada)");
            // Aquí irá la conexión que hicimos en el paso anterior
        }
    </script>
</body>
</html>
