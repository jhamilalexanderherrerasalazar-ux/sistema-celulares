<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Celulares Bolivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h1 class="text-2xl font-bold mb-6 text-white">SISTEMA POS</h1>
            <div id="tasaDia" class="text-yellow-400 mb-4 font-mono text-sm font-bold">Cargando tasa...</div>
            <button onclick="abrirVendedor()" class="w-full bg-green-600 p-3 rounded-lg mb-3 font-bold hover:bg-green-700 transition">VENDEDOR</button>
            <button onclick="abrirJefe()" class="w-full bg-blue-600 p-3 rounded-lg font-bold hover:bg-blue-700 transition">JEFE / DUEÑO</button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-md mx-auto">
        <h2 class="text-xl font-bold mb-4 text-green-400 font-bold text-center">Venta Mayorista</h2>
        <div class="bg-white text-slate-900 p-4 rounded-xl space-y-4 shadow-2xl">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Buscar Equipo en Stock</label>
                <input type="text" id="busqueda" onkeyup="buscarStock()" class="w-full border-2 p-2 rounded-lg outline-none focus:border-green-500" placeholder="Escribe marca o modelo...">
                <div id="listaSugerencias" class="bg-gray-100 mt-1 max-h-40 overflow-y-auto rounded shadow-inner border border-gray-200"></div>
            </div>
            
            <div class="p-3 bg-blue-50 rounded-lg text-center border border-blue-200">
                <p id="detallesEquipo" class="text-xs text-gray-600 font-bold italic">Selecciona un equipo de la lista...</p>
            </div>

            <div class="flex gap-2">
                <button onclick="setMoneda('USD')" id="btnUSD" class="flex-1 p-2 rounded-lg font-bold bg-green-600 text-white border-2 border-green-700">PAGO $ USD</button>
                <button onclick="setMoneda('BS')" id="btnBS" class="flex-1 p-2 rounded-lg font-bold bg-gray-200 text-gray-700 border-2 border-gray-300">PAGO BS.</button>
            </div>

            <div>
                <label id="labelMonto" class="block text-xs font-bold text-gray-500 uppercase mb-1 text-center">Monto a Cobrar ($)</label>
                <input type="number" id="precioVenta" oninput="calcularTotal()" class="w-full border-2 p-3 rounded-lg text-xl font-bold text-center focus:border-blue-500 outline-none" placeholder="0.00">
            </div>
            
            <div class="bg-slate-100 p-3 rounded-lg flex justify-between items-center font-bold">
                <span class="text-xs text-gray-500 uppercase italic">Equivalente:</span>
                <span id="labelEquivalente" class="text-blue-600 text-lg">0.00</span>
            </div>

            <button onclick="confirmarVenta()" id="btnVenta" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition uppercase tracking-wider">Finalizar Venta</button>
            <button onclick="location.reload()" class="w-full text-gray-400 text-xs font-bold uppercase tracking-tighter">← Volver al inicio</button>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4 max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-400">Panel de Control Gerencial</h2>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-xs font-bold uppercase">Salir</button>
        </div>
        
        <div class="bg-slate-800 p-4 rounded-xl border border-yellow-600/50 mb-6 shadow-lg">
            <h3 class="text-yellow-500 font-bold mb-3 underline uppercase text-xs">Tipo de Cambio del Día</h3>
            <div class="flex gap-2">
                <input type="number" id="nuevaTasa" class="bg-slate-700 p-2 rounded-lg w-full text-white outline-none border border-slate-600" placeholder="Ej: 12.80">
                <button onclick="guardarTasa()" class="bg-yellow-600 px-6 rounded-lg font-bold hover:bg-yellow-700 transition">ACTUALIZAR</button>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-xl border border-blue-500/50 shadow-lg">
            <h3 class="text-blue-400 font-bold mb-4 uppercase text-xs">Ingreso Masivo de Mercadería</h3>
            <div class="grid grid-cols-2 gap-3 text-slate-900">
                <input type="text" id="invMarca" class="p-2 rounded-lg bg-white" placeholder="Marca (Samsung)">
                <input type="text" id="invModelo" class="p-2 rounded-lg bg-white" placeholder="Modelo (S24)">
                <input type="text" id="invImei" class="p-2 rounded-lg bg-white" placeholder="IMEI (Si es 1 equipo)">
                <input type="number" id="invCosto" class="p-2 rounded-lg bg-white" placeholder="Costo Unit. $">
                <div class="col-span-2">
                    <label class="block text-blue-300 text-[10px] mb-1 font-bold">CANTIDAD DE EQUIPOS A INGRESAR</label>
                    <input type="number" id="invCantidad" class="w-full p-2 rounded-lg bg-white font-bold" value="1">
                </div>
            </div>
            <button onclick="cargarInventario()" id="btnCargar" class="w-full bg-blue-600 mt-4 p-3 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition">CARGAR AL STOCK</button>
        </div>
    </div>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbyTTNUAcLHY5eXS4rbwDwUj4ryhn_4kFv4kwYiU_GSoBwJ-TultYRvauZ8-Ce70ujak/exec";
        let stockReal = []; 
        let monedaActual = 'USD';
        window.tasaGlobal = 12.50;

        window.onload = async () => {
            try {
                // Cargar Tasa
                const resTasa = await fetch(urlScript + "?action=getTasa");
                const tasaText = await resTasa.text();
                window.tasaGlobal = parseFloat(tasaText) || 12.50;
                document.getElementById('tasaDia').innerText = "Tasa del día: 1$ = " + window.tasaGlobal + " Bs";

                // Cargar Inventario
                const resInv = await fetch(urlScript + "?action=getInventario");
                stockReal = await resInv.json();
            } catch (e) {
                document.getElementById('tasaDia').innerText = "Modo Offline (Tasa: 12.50 Bs)";
            }
        };

        function setMoneda(m) {
            monedaActual = m;
            document.getElementById('btnUSD').className = m === 'USD' ? 'flex-1 p-2 rounded-lg font-bold bg-green-600 text-white border-2 border-green-700' : 'flex-1 p-2 rounded-lg font-bold bg-gray-200 text-gray-700 border-2 border-gray-300';
            document.getElementById('btnBS').className = m === 'BS' ? 'flex-1 p-2 rounded-lg font-bold bg-blue-600 text-white border-2 border-blue-700' : 'flex-1 p-2 rounded-lg font-bold bg-gray-200 text-gray-700 border-2 border-gray-300';
            document.getElementById('labelMonto').innerText = m === 'USD' ? "Monto a Cobrar ($)" : "Monto a Cobrar (Bs)";
            calcularTotal();
        }

        function calcularTotal() {
            const monto = document.getElementById('precioVenta').value;
            const label = document.getElementById('labelEquivalente');
            if(!monto) { label.innerText = "0.00"; return; }
            
            if(monedaActual === 'USD') {
                label.innerText = (monto * window.tasaGlobal).toFixed(2) + " Bs";
            } else {
                label.innerText = (monto / window.tasaGlobal).toFixed(2) + " $ USD";
            }
        }

        function buscarStock() {
            const busq = document.getElementById('busqueda').value.toLowerCase();
            const sugerencias = document.getElementById('listaSugerencias');
            sugerencias.innerHTML = "";
            if (busq.length < 1) return;

            const filtrados = stockReal.filter(item => 
                item.marca.toLowerCase().includes(busq) || 
                item.modelo.toLowerCase().includes(busq) ||
                item.imei.toString().includes(busq)
            );

            filtrados.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-3 border-b hover:bg-green-100 cursor-pointer text-slate-800 text-left";
                div.innerHTML = `<p class="font-bold">${item.marca} ${item.modelo}</p><p class="text-[10px] text-gray-500">IMEI: ${item.imei}</p>`;
                div.onclick = () => {
                    document.getElementById('detallesEquipo').innerHTML = `<b>${item.marca} ${item.modelo}</b><br>IMEI: ${item.imei}`;
                    document.getElementById('busqueda').value = item.modelo;
                    sugerencias.innerHTML = "";
                    window.equipoVenta = item;
                };
                sugerencias.appendChild(div);
            });
        }

        function abrirVendedor() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('vendedorView').classList.remove('hidden'); }
        function abrirJefe() { 
            let p = prompt("Clave de Jefe:"); 
            if(p === "1234") {
                document.getElementById('loginScreen').classList.add('hidden'); 
                document.getElementById('jefeView').classList.remove('hidden');
            }
        }

        async function guardarTasa() {
            const tasa = document.getElementById('nuevaTasa').value;
            if(!tasa) return alert("Ingresa un valor");
            try {
                await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: "actualizarTasa", tasa: tasa }) });
                alert("✅ TASA ACTUALIZADA");
                location.reload();
            } catch (e) { alert("Error de conexión"); }
        }

        async function cargarInventario() {
            const marca = document.getElementById
