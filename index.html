<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Mayorista Bolivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h1 class="text-2xl font-bold mb-6">SISTEMA POS</h1>
            <div id="tasaDia" class="text-yellow-400 mb-4 font-mono text-sm font-bold italic underline">Conectando con Google...</div>
            <button onclick="abrirVendedor()" class="w-full bg-green-600 p-3 rounded-lg mb-3 font-bold hover:bg-green-700">VENDEDOR</button>
            <button onclick="abrirJefe()" class="w-full bg-blue-600 p-3 rounded-lg font-bold hover:bg-blue-700">JEFE / DUEÑO</button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-md mx-auto">
        <div class="bg-white text-slate-900 p-5 rounded-2xl shadow-2xl space-y-4">
            <h2 class="text-xl font-black text-green-600 text-center uppercase tracking-tighter">Nueva Venta</h2>
            
            <input type="text" id="busqueda" onkeyup="buscarStock()" class="w-full border-2 p-3 rounded-xl outline-none focus:border-green-500" placeholder="🔍 Buscar por modelo o imei...">
            <div id="listaSugerencias" class="bg-slate-50 max-h-48 overflow-y-auto rounded-lg border border-slate-200"></div>

            <div id="detallesEquipo" class="p-3 bg-blue-50 text-blue-800 rounded-xl text-center text-sm font-bold border border-blue-100 italic">Selecciona un equipo de la lista</div>

            <div class="flex gap-2">
                <button onclick="setMoneda('USD')" id="btnUSD" class="flex-1 p-2 rounded-xl font-bold bg-green-600 text-white">COBRAR $</button>
                <button onclick="setMoneda('BS')" id="btnBS" class="flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600">COBRAR BS.</button>
            </div>

            <input type="number" id="precioVenta" oninput="calcularTotal()" class="w-full border-2 p-4 rounded-2xl text-2xl font-black text-center focus:border-blue-500 outline-none" placeholder="0.00">
            
            <div class="bg-slate-800 p-3 rounded-xl flex justify-between items-center font-mono">
                <span class="text-[10px] text-slate-400 uppercase">Equivalente:</span>
                <span id="labelEquivalente" class="text-yellow-400 font-bold">0.00</span>
            </div>

            <button onclick="confirmarVenta()" id="btnVenta" class="w-full bg-green-600 text-white p-4 rounded-2xl font-black shadow-lg hover:bg-green-700 transition uppercase">Finalizar Venta</button>
            <button onclick="location.reload()" class="w-full text-slate-400 text-xs font-bold py-2">← VOLVER</button>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-blue-400 uppercase">Panel Control</h2>
            <button onclick="location.reload()" class="bg-red-500 px-3 py-1 rounded text-xs font-bold">SALIR</button>
        </div>

        <div class="bg-slate-800 p-4 rounded-2xl border border-yellow-600/30 mb-6">
            <h3 class="text-yellow-500 text-xs font-bold mb-2 uppercase">Tipo de Cambio</h3>
            <div class="flex gap-2">
                <input type="number" id="nuevaTasa" class="bg-slate-700 p-3 rounded-xl w-full text-white outline-none" placeholder="Ej: 12.80">
                <button onclick="guardarTasa()" class="bg-yellow-600 px-4 rounded-xl font-bold">OK</button>
            </div>
        </div>

        <div class="bg-slate-800 p-4 rounded-2xl border border-blue-500/30">
            <div class="bg-slate-800 p-4 rounded-2xl border border-blue-500/30">
    <h3 class="text-blue-400 text-xs font-bold mb-4 uppercase text-center">Registro Rápido con Foto</h3>
    <div class="grid grid-cols-2 gap-3 text-slate-900">
        <input type="text" id="invMarca" class="p-3 rounded-xl bg-white text-sm" placeholder="Marca (Ej: Xiaomi)">
        <input type="text" id="invModelo" class="p-3 rounded-xl bg-white text-sm" placeholder="Modelo (Ej: Note 13)">
        <input type="number" id="invCosto" class="p-3 rounded-xl bg-white text-sm" placeholder="Costo Unit $">
        <input type="number" id="invCantidad" class="p-3 rounded-xl bg-slate-200 font-bold" value="1">
        
        <div class="col-span-2 space-y-2">
            <button onclick="document.getElementById('inputFoto').click()" class="w-full bg-slate-700 text-white p-3 rounded-xl text-xs font-bold border-2 border-dashed border-slate-500">
                <i class="fas fa-camera mr-2"></i> TOMAR FOTO DEL LOTE / EQUIPO
            </button>
            <input type="file" id="inputFoto" accept="image/*" capture="environment" class="hidden">
            <p id="statusFoto" class="text-[10px] text-green-400 text-center hidden italic">Foto lista para subir</p>
        </div>
    </div>
    <button onclick="cargarInventario()" id="btnCargar" class="w-full bg-blue-600 mt-4 p-4 rounded-2xl font-bold hover:bg-blue-700">CARGAR STOCK AHORA</button>
</div>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="invMarca" class="p-3 rounded-xl bg-white text-slate-900 text-sm" placeholder="Marca">
                <input type="text" id="invModelo" class="p-3 rounded-xl bg-white text-slate-900 text-sm" placeholder="Modelo">
                <input type="text" id="invImei" class="p-3 rounded-xl bg-white text-slate-900 text-sm col-span-2" placeholder="IMEI (Si es solo uno)">
                <input type="number" id="invCosto" class="p-3 rounded-xl bg-white text-slate-900 text-sm" placeholder="Costo $">
                <input type="number" id="invCantidad" class="p-3 rounded-xl bg-slate-200 text-slate-900 text-sm font-bold" value="1">
            </div>
            <button onclick="cargarInventario()" id="btnCargar" class="w-full bg-blue-600 mt-4 p-4 rounded-2xl font-bold hover:bg-blue-700 transition">CARGAR AL STOCK</button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU NUEVO LINK DE GOOGLE
        const urlScript = "https://script.google.com/macros/s/AKfycby2DXgw5XKfK5cM0jjfFJmalyUkA8vOd6vj4PQQdetUj1z692Gnrtbg84ofjGygIkUP/exec";
        
        let stockReal = [];
        let monedaActual = 'USD';
        window.tasaGlobal = 12.50;

        window.onload = async () => {
            try {
                const resTasa = await fetch(urlScript + "?action=getTasa");
                const tasaVal = await resTasa.text();
                window.tasaGlobal = parseFloat(tasaVal) || 12.50;
                document.getElementById('tasaDia').innerText = "Tasa Actual: " + window.tasaGlobal + " Bs";

                const resInv = await fetch(urlScript + "?action=getInventario");
                stockReal = await resInv.json();
            } catch (e) {
                document.getElementById('tasaDia').innerText = "Error de Conexión";
            }
        };

        function setMoneda(m) {
            monedaActual = m;
            document.getElementById('btnUSD').className = m === 'USD' ? 'flex-1 p-2 rounded-xl font-bold bg-green-600 text-white' : 'flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600';
            document.getElementById('btnBS').className = m === 'BS' ? 'flex-1 p-2 rounded-xl font-bold bg-blue-600 text-white' : 'flex-1 p-2 rounded-xl font-bold bg-slate-200 text-slate-600';
            calcularTotal();
        }

        function calcularTotal() {
            const monto = document.getElementById('precioVenta').value;
            const label = document.getElementById('labelEquivalente');
            if(!monto) { label.innerText = "0.00"; return; }
            label.innerText = monedaActual === 'USD' ? (monto * window.tasaGlobal).toFixed(2) + " Bs" : (monto / window.tasaGlobal).toFixed(2) + " $ USD";
        }

        function buscarStock() {
            const busq = document.getElementById('busqueda').value.toLowerCase();
            const sug = document.getElementById('listaSugerencias');
            sug.innerHTML = "";
            if (busq.length < 1) return;

            const filtrados = stockReal.filter(i => i.modelo.toLowerCase().includes(busq) || i.imei.toString().includes(busq));
            filtrados.forEach(i => {
                const d = document.createElement('div');
                d.className = "p-3 border-b text-slate-800 text-sm cursor-pointer hover:bg-green-50";
                d.innerHTML = `<b>${i.marca} ${i.modelo}</b><br><span class="text-xs text-gray-400">IMEI: ${i.imei}</span>`;
                d.onclick = () => {
                    window.equipoVenta = i;
                    document.getElementById('detallesEquipo').innerText = i.marca + " " + i.modelo + " (IMEI: " + i.imei + ")";
                    document.getElementById('busqueda').value = i.modelo;
                    sug.innerHTML = "";
                };
                sug.appendChild(d);
            });
        }

        function abrirVendedor() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('vendedorView').classList.remove('hidden'); }
        function abrirJefe() { if(prompt("Clave:") === "1234") { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('jefeView').classList.remove('hidden'); } }

        async function guardarTasa() {
            const t = document.getElementById('nuevaTasa').value;
            if(!t) return;
            await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ accion: "actualizarTasa", tasa: t }) });
            alert("Tasa Actualizada");
            location.reload();
        }

        async function cargarInventario() {
            const btn = document.getElementById('btnCargar');
            btn.disabled = true; btn.innerText = "ESPERE...";
            const datos = {
                accion: "cargarStock",
                marca: document.getElementById('invMarca').value,
                modelo: document.getElementById('invModelo').value,
                imei: document.getElementById('invImei').value,
                costo: document.getElementById('invCosto').value,
                cantidad: document.getElementById('invCantidad').value
            };
            await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("Mercadería Cargada");
            location.reload();
        }

        async function confirmarVenta() {
            if(!window.equipoVenta || !document.getElementById('precioVenta').value) return alert("Faltan datos");
            const btn = document.getElementById('btnVenta');
            btn.disabled = true; btn.innerText = "REGISTRANDO...";
            
            const monto = document.getElementById('precioVenta').value;
            const datos = {
                accion: "registrarVenta",
                modelo: window.equipoVenta.modelo,
                imei: window.equipoVenta.imei,
                costo: window.equipoVenta.costo,
                precioUsd: monedaActual === 'USD' ? monto : (monto / window.tasaGlobal).toFixed(2),
                precioBs: monedaActual === 'BS' ? monto : (monto * window.tasaGlobal).toFixed(2),
                tasaUsada: window.tasaGlobal,
                vendedor: "Web"
            };
            await fetch(urlScript, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("Venta Exitosa");
            location.reload();
        }
    </script>
</body>
</html>
